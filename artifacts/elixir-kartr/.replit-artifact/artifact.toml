kind = "web"
previewPath = "/"
title = "Elixir Kartr"
version = "1.0.0"
id = "artifacts/elixir-kartr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21631

[services.development]
run = "pnpm --filter @workspace/elixir-kartr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elixir-kartr", "run", "build" ]
publicDir = "artifacts/elixir-kartr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21631"
BASE_PATH = "/"
